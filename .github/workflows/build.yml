name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y autoconf libtool cmake libffi-dev libssl-dev \
            libltdl-dev zip unzip

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Clean Buildozer cache
        run: rm -rf ~/.buildozer

      - name: Build APK
        working-directory: ${{ github.workspace }}
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-border-apk
          path: bin/*.apk
